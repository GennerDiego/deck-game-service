version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: deck-game-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - deck-game-network

volumes:
  redis-data:
    driver: local

networks:
  deck-game-network:
    driver: bridge
