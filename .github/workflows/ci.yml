name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ==================== JOB 1: Unit Tests + Code Coverage ====================
  unit-tests:
    name: "Unit Tests & Code Coverage"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔍 Run Spotless Check
        run: ./gradlew spotlessCheck

      - name: 🧪 Run Unit Tests (Controller + Service + Interceptor)
        run: ./gradlew unitTest

      - name: 📊 Generate Jacoco Coverage Report
        run: ./gradlew jacocoTestReport

      - name: 📈 Upload Coverage to Codecov (Optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: 📋 Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 80
          title: '📊 Unit Test Coverage Report'
          update-comment: true
        continue-on-error: true

      - name: 📊 Display Coverage Summary
        run: |
          echo "=== Coverage Summary ==="
          if [ -f build/reports/jacoco/test/html/index.html ]; then
            echo "✅ Coverage report generated successfully"
            echo "📂 Location: build/reports/jacoco/test/html/index.html"
          else
            echo "⚠️ Coverage report not found"
          fi

      - name: 📤 Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            build/reports/tests/unitTest/
            build/test-results/unitTest/

      - name: 📤 Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      - name: ✅ Unit Tests Summary
        if: always()
        run: |
          echo "### 🧪 Unit Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Spotless Check**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests**: Check artifacts for detailed results" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Report**: Available in artifacts" >> $GITHUB_STEP_SUMMARY

  # ==================== JOB 2: Integration Tests ====================
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests  # Only run if unit tests pass

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🐳 Verify Docker
        run: docker --version

      - name: 🐳 Pull Redis Testcontainer Image
        run: docker pull redis:7-alpine

      - name: 🧪 Run Integration Tests
        run: ./gradlew integrationTest
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 📤 Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            build/reports/tests/integrationTest/
            build/test-results/integrationTest/

      - name: ✅ Integration Tests Summary
        if: always()
        run: |
          echo "### 🧪 Integration Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Tests**: Check artifacts for detailed results" >> $GITHUB_STEP_SUMMARY
          echo "- **Testcontainers**: ✅ Redis container used" >> $GITHUB_STEP_SUMMARY

  # ==================== JOB 3: Final Summary ====================
  summary:
    name: "CI Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: 📊 Overall Summary
        run: |
          echo "### 🎉 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests & Coverage | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Artifacts Available:**" >> $GITHUB_STEP_SUMMARY
          echo "- Unit test results" >> $GITHUB_STEP_SUMMARY
          echo "- Code coverage report" >> $GITHUB_STEP_SUMMARY
          echo "- Integration test results" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if any job failed
        if: needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success'
        run: |
          echo "❌ CI Pipeline failed!"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}"
          echo "- Integration Tests: ${{ needs.integration-tests.result }}"
          exit 1

      - name: ✅ All jobs passed
        if: needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success'
        run: |
          echo "✅ All CI checks passed!"
          echo "🚀 Ready to merge!"
