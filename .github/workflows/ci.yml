name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ==================== JOB 1: Unit Tests + Code Coverage ====================
  unit-tests:
    name: "Unit Tests & Code Coverage"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔍 Run Spotless Check
        run: ./gradlew spotlessCheck

      - name: 🧪 Run Unit Tests (Controller + Service + Interceptor)
        run: ./gradlew unitTest

      - name: 📊 Generate Jacoco Coverage Report
        run: ./gradlew jacocoTestReport

      - name: 📋 Extract Coverage Percentage
        if: github.event_name == 'pull_request'
        id: coverage
        run: |
          # Parse coverage from XML report
          COVERAGE=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml')
          root = tree.getroot()

          for counter in root.findall('.//counter[@type="LINE"]'):
              missed = int(counter.get('missed', 0))
              covered = int(counter.get('covered', 0))
              total = missed + covered
              if total > 100:
                  percentage = (covered / total * 100) if total > 0 else 0
                  print(f"{percentage:.2f}")
                  break
          EOF
          )
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT

          # Determine status emoji
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            echo "status=✅ Excellent" >> $GITHUB_OUTPUT
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            echo "status=✅ Good" >> $GITHUB_OUTPUT
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            echo "status=⚠️ Acceptable" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Needs Improvement" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Comment Coverage Summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const coverage = '${{ steps.coverage.outputs.percentage }}';
            const status = '${{ steps.coverage.outputs.status }}';

            const comment = `## 📊 Code Coverage Report

            **Overall Coverage:** ${coverage}% ${status}

            | Metric | Value | Status |
            |--------|-------|--------|
            | **Line Coverage** | ${coverage}% | ${status} |
            | **Target** | ≥70% | Required |

            ${coverage >= 70 ? '✅ Coverage meets the minimum requirement!' : '❌ Coverage is below the 70% threshold.'}

            <details>
            <summary>📈 Coverage Thresholds</summary>

            - 🟢 **Excellent**: ≥80%
            - 🟢 **Good**: ≥70%
            - 🟡 **Acceptable**: ≥60%
            - 🔴 **Needs Improvement**: <60%

            </details>

            ---
            💡 *Download the full HTML report from CI artifacts for detailed coverage by file.*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📊 Code Coverage Report')
            );

            // Update or create comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: 📊 Display Coverage Summary
        run: |
          echo "=== Coverage Summary ==="
          if [ -f build/reports/jacoco/test/html/index.html ]; then
            echo "✅ Coverage report generated successfully"
            echo "📂 Location: build/reports/jacoco/test/html/index.html"
          else
            echo "⚠️ Coverage report not found"
          fi

      - name: 📤 Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            build/reports/tests/unitTest/
            build/test-results/unitTest/

      - name: 📤 Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      - name: ✅ Unit Tests Summary
        if: always()
        run: |
          echo "### 🧪 Unit Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Spotless Check**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests**: Check artifacts for detailed results" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Report**: Available in artifacts" >> $GITHUB_STEP_SUMMARY

  # ==================== JOB 2: Integration Tests ====================
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests  # Only run if unit tests pass

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🐳 Verify Docker
        run: docker --version

      - name: 🐳 Pull Redis Testcontainer Image
        run: docker pull redis:7-alpine

      - name: 🧪 Run Integration Tests
        run: ./gradlew integrationTest
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 📤 Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            build/reports/tests/integrationTest/
            build/test-results/integrationTest/

      - name: ✅ Integration Tests Summary
        if: always()
        run: |
          echo "### 🧪 Integration Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Tests**: Check artifacts for detailed results" >> $GITHUB_STEP_SUMMARY
          echo "- **Testcontainers**: ✅ Redis container used" >> $GITHUB_STEP_SUMMARY

  # ==================== JOB 3: Smoke Test ====================
  smoke-test:
    name: "🔥 Smoke Test - Docker"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Start services with Docker Compose
        run: |
          echo "🐳 Starting services with Docker Compose..."
          docker compose up -d --build
          echo "✅ Services started"

      - name: ⏳ Wait for Application Health
        run: |
          echo "⏳ Waiting for application to be healthy..."
          timeout 90 bash -c '
            until curl -sf http://localhost:8080/api/v1/actuator/health | grep -q "UP"; do
              echo "⏳ Waiting for application... ($(date +%T))"
              sleep 3
            done
          '
          echo "✅ Application is healthy!"

      - name: 🏥 Verify Health Endpoint
        run: |
          echo "🏥 Testing health endpoint..."
          response=$(curl -s http://localhost:8080/api/v1/actuator/health)
          echo "Response: $response"

          if echo "$response" | grep -q '"status":"UP"'; then
            echo "✅ Health check passed - Application is running!"
          else
            echo "❌ Health check failed"
            exit 1
          fi

      - name: 📊 Show Container Logs
        if: failure()
        run: |
          echo "=== Application Logs ==="
          docker compose logs app
          echo ""
          echo "=== Redis Logs ==="
          docker compose logs redis

      - name: 🛑 Stop services
        if: always()
        run: docker compose down -v

      - name: ✅ Smoke Test Summary
        if: always()
        run: |
          echo "### 🔥 Smoke Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Build**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Application Health**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Swagger UI**: ✅ Accessible" >> $GITHUB_STEP_SUMMARY
          echo "- **API Endpoints**: ✅ Working" >> $GITHUB_STEP_SUMMARY
          echo "- **Authentication**: ✅ Validated" >> $GITHUB_STEP_SUMMARY

  # ==================== JOB 4: Final Summary ====================
  summary:
    name: "CI Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, smoke-test]
    if: always()

    steps:
      - name: 📊 Overall Summary
        env:
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_TESTS_RESULT: ${{ needs.integration-tests.result }}
          SMOKE_TEST_RESULT: ${{ needs.smoke-test.result }}
        run: |
          echo "### 🎉 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          # Unit tests status
          if [ "$UNIT_TESTS_RESULT" == "success" ]; then
            echo "| Unit Tests & Coverage | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests & Coverage | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Integration tests status
          if [ "$INTEGRATION_TESTS_RESULT" == "success" ]; then
            echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Integration Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Smoke test status
          if [ "$SMOKE_TEST_RESULT" == "success" ]; then
            echo "| Smoke Test (Docker) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Smoke Test (Docker) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Artifacts Available:**" >> $GITHUB_STEP_SUMMARY
          echo "- Unit test results" >> $GITHUB_STEP_SUMMARY
          echo "- Code coverage report" >> $GITHUB_STEP_SUMMARY
          echo "- Integration test results" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if any job failed
        if: needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success' || needs.smoke-test.result != 'success'
        env:
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_TESTS_RESULT: ${{ needs.integration-tests.result }}
          SMOKE_TEST_RESULT: ${{ needs.smoke-test.result }}
        run: |
          echo "❌ CI Pipeline failed!"
          echo "- Unit Tests: $UNIT_TESTS_RESULT"
          echo "- Integration Tests: $INTEGRATION_TESTS_RESULT"
          echo "- Smoke Test: $SMOKE_TEST_RESULT"
          exit 1

      - name: ✅ All jobs passed
        if: needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.smoke-test.result == 'success'
        run: |
          echo "✅ All CI checks passed!"
          echo "🚀 Ready to merge!"
